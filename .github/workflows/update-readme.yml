name: Update README

on:
  schedule:
    - cron: "0 0 */15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure assets folder exists
        run: mkdir -p assets

      - name: Run scripts
        run: |
          node scripts/generate-stats.js
          node scripts/update-readme.js

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add README.md assets/
          git commit -m "Auto update README stats" || echo "No changes"
          git push
